openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Email CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: templates
    description: Email template management
  - name: emails
    description: Email sending and history
  - name: accounts
    description: Sender account management
  - name: dashboard
    description: Dashboard analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List sender accounts
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create sender account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"

  /accounts/{id}:
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    patch:
      operationId: updateAccount
      tags: [accounts]
      summary: Update account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Updated account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Delete account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /templates:
    get:
      operationId: listTemplates
      tags: [templates]
      summary: List email templates
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Template"
    post:
      operationId: createTemplate
      tags: [templates]
      summary: Create a template (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateInput"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"

  /templates/{id}:
    get:
      operationId: getTemplate
      tags: [templates]
      summary: Get template by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    patch:
      operationId: updateTemplate
      tags: [templates]
      summary: Update template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TemplateUpdate"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Template"
    delete:
      operationId: deleteTemplate
      tags: [templates]
      summary: Delete template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /emails/send:
    post:
      operationId: sendEmails
      tags: [emails]
      summary: Send emails to a list of recipients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendEmailInput"
      responses:
        "200":
          description: Email job queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailResponse"

  /emails/history:
    get:
      operationId: listEmailHistory
      tags: [emails]
      summary: List email sending history
      parameters:
        - name: accountId
          in: query
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          schema:
            type: ["string", "null"]
            enum: [sent, failed, pending, null]
        - name: dateFrom
          in: query
          schema:
            type: ["string", "null"]
        - name: dateTo
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paginated email history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailHistoryPage"

  /emails/history/{id}/retry:
    post:
      operationId: retryEmail
      tags: [emails]
      summary: Retry a failed email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retry queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /emails/queue:
    get:
      operationId: getEmailQueue
      tags: [emails]
      summary: Get current email queue status
      responses:
        "200":
          description: Queue status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueueStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get overall dashboard stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/account-stats:
    get:
      operationId: getAccountStats
      tags: [dashboard]
      summary: Get per-account email statistics
      responses:
        "200":
          description: Account-level stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountStat"

  /dashboard/daily-activity:
    get:
      operationId: getDailyActivity
      tags: [dashboard]
      summary: Get daily email activity for charts
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Daily activity data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyActivity"

  /dashboard/errors:
    get:
      operationId: listErrors
      tags: [dashboard]
      summary: List recent email errors
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Error logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, email, name, role, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, user]
        region:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [email, name, password, role]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin, user]
        region:
          type: ["string", "null"]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, user]
        region:
          type: ["string", "null"]
        isActive:
          type: boolean
        password:
          type: string
          minLength: 6

    Account:
      type: object
      required: [id, name, email, region, smtpHost, smtpPort, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        region:
          type: string
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUser:
          type: string
        isActive:
          type: boolean
        dailyLimit:
          type: integer
        sentToday:
          type: integer
        createdAt:
          type: string
          format: date-time

    AccountInput:
      type: object
      required: [name, email, region, smtpHost, smtpPort, smtpUser, smtpPass]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        region:
          type: string
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUser:
          type: string
        smtpPass:
          type: string
        dailyLimit:
          type: integer

    AccountUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        region:
          type: string
        smtpHost:
          type: string
        smtpPort:
          type: integer
        smtpUser:
          type: string
        smtpPass:
          type: string
        isActive:
          type: boolean
        dailyLimit:
          type: integer

    Template:
      type: object
      required: [id, name, subject, htmlContent, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        subject:
          type: string
        htmlContent:
          type: string
        textContent:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        variables:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TemplateInput:
      type: object
      required: [name, subject, htmlContent]
      properties:
        name:
          type: string
        subject:
          type: string
        htmlContent:
          type: string
        textContent:
          type: string
        category:
          type: string
        variables:
          type: array
          items:
            type: string

    TemplateUpdate:
      type: object
      properties:
        name:
          type: string
        subject:
          type: string
        htmlContent:
          type: string
        textContent:
          type: string
        category:
          type: string
        variables:
          type: array
          items:
            type: string

    SendEmailInput:
      type: object
      required: [accountId, templateId, recipients, subject]
      properties:
        accountId:
          type: integer
        templateId:
          type: integer
        recipients:
          type: string
          description: "Newline-separated email addresses or Name,email pairs"
        subject:
          type: string
        htmlContent:
          type: ["string", "null"]
          description: "Override template HTML"
        delaySeconds:
          type: integer
          default: 0
          description: "Delay between sends in seconds"

    SendEmailResponse:
      type: object
      required: [queued, recipients]
      properties:
        queued:
          type: integer
        recipients:
          type: integer
        message:
          type: string

    EmailHistory:
      type: object
      required: [id, accountId, accountName, recipientEmail, subject, status, createdAt]
      properties:
        id:
          type: integer
        accountId:
          type: integer
        accountName:
          type: string
        recipientEmail:
          type: string
        recipientName:
          type: ["string", "null"]
        subject:
          type: string
        status:
          type: string
          enum: [sent, failed, pending]
        errorMessage:
          type: ["string", "null"]
        sentAt:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    EmailHistoryPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EmailHistory"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    QueueStatus:
      type: object
      required: [pending, processing, total]
      properties:
        pending:
          type: integer
        processing:
          type: integer
        total:
          type: integer

    DashboardStats:
      type: object
      required: [totalSent, totalFailed, totalPending, totalDelivered, openRate, bounceRate, totalAccounts, activeAccounts]
      properties:
        totalSent:
          type: integer
        totalFailed:
          type: integer
        totalPending:
          type: integer
        totalDelivered:
          type: integer
        openRate:
          type: number
        bounceRate:
          type: number
        totalAccounts:
          type: integer
        activeAccounts:
          type: integer

    AccountStat:
      type: object
      required: [accountId, accountName, region, sent, failed, pending]
      properties:
        accountId:
          type: integer
        accountName:
          type: string
        region:
          type: string
        sent:
          type: integer
        failed:
          type: integer
        pending:
          type: integer
        successRate:
          type: number

    DailyActivity:
      type: object
      required: [date, sent, failed]
      properties:
        date:
          type: string
        sent:
          type: integer
        failed:
          type: integer

    EmailError:
      type: object
      required: [id, accountName, recipientEmail, errorType, errorMessage, createdAt]
      properties:
        id:
          type: integer
        accountName:
          type: string
        recipientEmail:
          type: string
        errorType:
          type: string
          enum: [smtp_failed, invalid_email, blocked, limit_reached, auth_error, unknown]
        errorMessage:
          type: string
        canRetry:
          type: boolean
        createdAt:
          type: string
          format: date-time
