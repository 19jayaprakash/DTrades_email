kind = "web"
previewPath = "/"
title = "Email CRM"
version = "1.0.0"
id = "artifacts/email-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25095

[services.development]
run = "pnpm --filter @workspace/email-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/email-crm", "run", "build" ]
publicDir = "artifacts/email-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25095"
BASE_PATH = "/"
